<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f3e6"/>
      <stop offset="100%" stop-color="#ebdfc3"/>
    </linearGradient>
  </defs>

  <!-- paper background -->
  <rect width="180" height="180" rx="32" fill="url(#paper)"/>

  <!-- double-line frame -->
  <rect x="18" y="18" width="144" height="144" rx="6"
        fill="none" stroke="#2b2520" stroke-width="1.8"/>
  <rect x="24" y="24" width="132" height="132" rx="4"
        fill="none" stroke="#2b2520" stroke-width="0.7"/>

  <!-- corner ornaments (diamonds) -->
  <g fill="#2b2520">
    <rect x="16" y="16" width="4" height="4" transform="rotate(45 18 18)"/>
    <rect x="160" y="16" width="4" height="4" transform="rotate(45 162 18)"/>
    <rect x="16" y="160" width="4" height="4" transform="rotate(45 18 162)"/>
    <rect x="160" y="160" width="4" height="4" transform="rotate(45 162 162)"/>
  </g>

  <!-- top ornament: a tiny flourish -->
  <g stroke="#2b2520" stroke-width="1.2" stroke-linecap="round" fill="none">
    <line x1="70" y1="46" x2="110" y2="46"/>
    <circle cx="90" cy="46" r="1.8" fill="#2b2520"/>
    <path d="M 78 42 Q 90 38, 102 42"/>
  </g>

  <!-- center serif R monogram -->
  <text x="90" y="122"
        font-family="'Didot', 'Bodoni 72', 'Times New Roman', Georgia, serif"
        font-size="104"
        font-weight="700"
        text-anchor="middle"
        fill="#2b2520">R</text>

  <!-- bottom ornament + caption -->
  <g stroke="#2b2520" stroke-width="1" stroke-linecap="round" fill="none">
    <line x1="40" y1="136" x2="74" y2="136"/>
    <line x1="106" y1="136" x2="140" y2="136"/>
    <path d="M 82 136 Q 90 132, 98 136"/>
  </g>
  <text x="90" y="150"
        font-family="'Times New Roman', Georgia, serif"
        font-size="9"
        letter-spacing="2.4"
        text-anchor="middle"
        fill="#5a4a3a"
        font-weight="600">READ THE RECORD</text>
</svg>
