<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7ee"/>
      <stop offset="100%" stop-color="#ead9b8"/>
    </linearGradient>
    <linearGradient id="lip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9733f"/>
      <stop offset="100%" stop-color="#8a4a23"/>
    </linearGradient>
    <linearGradient id="lipLower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0582b"/>
      <stop offset="100%" stop-color="#7a3e1d"/>
    </linearGradient>
  </defs>

  <!-- paper background with soft frame -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect x="10" y="10" width="160" height="160" rx="28" fill="none" stroke="#d4c9b2" stroke-width="1.2"/>

  <!-- upper lip -->
  <path
    d="M 34 82
       C 46 62, 66 60, 78 78
       C 84 72, 96 72, 102 78
       C 114 60, 134 62, 146 82
       Q 140 88, 90 88
       Q 40 88, 34 82 Z"
    fill="url(#lip)"/>
  <!-- upper lip highlight -->
  <path
    d="M 56 72 Q 64 66, 72 72"
    stroke="#e3b58d" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- book being held in the mouth (horizontal, slight tilt) -->
  <g transform="rotate(-5 90 94)">
    <!-- book back shadow -->
    <rect x="22" y="86" width="136" height="20" rx="1.5" fill="#2b2520" opacity="0.25"
          transform="translate(0,2)"/>
    <!-- cover -->
    <rect x="22" y="84" width="136" height="20" rx="1.5" fill="#2b2520"/>
    <!-- pages (front edge) -->
    <rect x="22" y="88" width="136" height="12" fill="#fbf7ee"/>
    <!-- center spine crease -->
    <line x1="90" y1="86" x2="90" y2="102" stroke="#c2b48f" stroke-width="1"/>
    <!-- text lines left page -->
    <line x1="30" y1="91" x2="84" y2="91" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
    <line x1="30" y1="95" x2="80" y2="95" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
    <line x1="30" y1="99" x2="82" y2="99" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
    <!-- text lines right page -->
    <line x1="96" y1="91" x2="150" y2="91" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
    <line x1="96" y1="95" x2="146" y2="95" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
    <line x1="96" y1="99" x2="148" y2="99" stroke="#c2b48f" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- lower lip -->
  <path
    d="M 34 106
       Q 40 100, 90 100
       Q 140 100, 146 106
       C 134 128, 100 134, 90 132
       C 80 134, 46 128, 34 106 Z"
    fill="url(#lipLower)"/>
  <!-- lower lip highlight -->
  <path
    d="M 78 116 Q 90 120, 102 116"
    stroke="#d69166" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
