services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "3040:3000"
    env_file:
      - .env.local
    environment:
      AUDIO_DIR: /data/audio
    volumes:
      - audio:/data/audio
    restart: unless-stopped

volumes:
  audio:
